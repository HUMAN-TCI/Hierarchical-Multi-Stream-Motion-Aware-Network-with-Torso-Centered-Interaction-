hydra:
  run:
    dir: runs/${hydra.job.override_dirname}/run-${optim.seed}
  sweep:
    dir: runs
    subdir: ${hydra.job.override_dirname}/data_rep=${data_rep}/space-dim=${common_space_dim}/run-${optim.seed}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: MULTIRUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=MULTIRUN
    task:
    - motion_model=upper-lower-gru
    - text_model=clip
    - optim=info-nce
    - data=kit-mocap
    - optim.batch_size=96
    - +data.num_workers=0
  job:
    name: train
    chdir: null
    override_dirname: +data.num_workers=0/data=kit-mocap/motion_model=upper-lower-gru/optim.batch_size=96/optim=info-nce/text_model=clip
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: /
        exclude_keys:
        - optim.resume
        - optim.seed
        - common_space_dim
        - data_rep
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: C:\text-to-motion-retrieval_Exp
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: C:\text-to-motion-retrieval_Exp\configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: ???
    choices:
      data: kit-mocap
      optim: info-nce
      text_model: clip
      motion_model: upper-lower-gru
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
motion_model:
  name: UpperLowerGRU
  module:
    _target_: models.motions.UpperLowerGRU
    h1: 32
    h2: 128
    h3: 256
text_model:
  name: CLIP
  module:
    _target_: models.texts.CLIP
optim:
  optimizer:
    _target_: torch.optim.Adam
    lr: 3.0e-05
  lr_scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    T_max: 120
  batch_size: 96
  epochs: 120
  seed: 42
  val_freq: 100
  log_every: 10
  loss:
    _target_: models.losses.InfoNCELoss
    temperature: 0.07
    max_logit_scale: 100
    margin: 0.01
data:
  common:
    _target_: data_loaders.get_dataset_loader
    name: kit
    num_frames: 40
    max_violation_after: 5
  train:
    _target_: data_loaders.get_dataset_loader
    name: kit
    num_frames: 40
    max_violation_after: 5
    split: train
    hml_mode: train
  val:
    _target_: data_loaders.get_dataset_loader
    name: kit
    num_frames: 40
    max_violation_after: 5
    split: val
    hml_mode: eval
  test:
    _target_: data_loaders.get_dataset_loader
    name: kit
    num_frames: 40
    max_violation_after: 5
    split: test
    hml_mode: eval
  num_workers: 0
gpu: 0
resume: false
data_rep: cont_6d_plus_rifke
common_space_dim: 256
final_dropout: 0.4
